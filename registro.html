<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="form-section" style="padding: 60px 0; display: flex; justify-content: center;">
        <div class="form-wrapper" style="max-width: 600px; width: 100%; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border: 1px solid #FFC0CB;">
            
            <h2 style="color: #8B4513; margin-bottom: 5px; font-size: 2rem;">
                Registro de Usuario
            </h2>
            <p style="margin-bottom: 20px; color: #5D4037; font-size: 0.9rem; font-style: italic;">
                Únete a nuestra tradición de 50 años (desde 1995) y disfruta de beneficios exclusivos.
            </p>
            
            <form id="form-registro" novalidate style="display: flex; flex-direction: column; gap: 18px; text-align: left;">
                
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">RUN (Sin puntos ni guion)</label>
                    <input type="text" id="reg-run" placeholder="19011022K" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                    <div class="error-text" id="err-reg-run" style="color: #e1306c; font-size: 14px; display: none; font-weight: 500; margin-top: 2px;">RUN es requerido.</div>
                </div>
                
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Fecha de Nacimiento</label>
                    <input type="date" id="reg-fecha-nac" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                    <div class="error-text" id="err-reg-fecha-nac" style="color: #e1306c; font-size: 14px; display: none; font-weight: 500; margin-top: 2px;">La fecha es requerida.</div>
                </div>
                
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Nombre</label>
                    <input type="text" id="reg-nombre" placeholder="Nombre" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                </div>
                
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="correo@gmail.com" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                </div>

                <!-- Campo Código -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Código de Descuento (Opcional)</label>
                    <input type="text" id="reg-codigo" placeholder="Ej: FELICES50" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                <div class="error-text" id="err-reg-codigo" style="color: #e1306c; font-size: 14px; display: none; font-weight: 500; margin-top: 2px;">Código inválido.</div>
                </div>

            <!-- Campo Correo Duoc -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Correo Institucional (Estudiantes Duoc)</label>
                    <input type="email" id="reg-email-duoc" placeholder="estudiante@duocuc.cl" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                <div class="error-text" id="err-reg-email-duoc" style="color: #e1306c; font-size: 14px; display: none; font-weight: 500; margin-top: 2px;">Correo institucional inválido.</div>
                </div>
                <!-- Fin campos -->

                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Contraseña</label>
                    <input type="password" id="reg-pass" placeholder="********" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%;">
                </div>

                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Región</label>
                    <select id="miRegion" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;"></select>
                </div>

                <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; color: #8B4513;">Comuna</label>
                    <select id="miComuna" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;"></select>
                </div>

                <button type="submit" class="btn-action" style="padding: 12px; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; background-color: #FFC0CB; color: #8B4513; border-radius: 6px; font-weight: bold;">
                    Registrar Cuenta
                </button>
            </form>
        </div>
    </section>

    <script src="js/validaciones.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            iniciarSelectores('miRegion', 'miComuna');
        });
    </script>
</body>
</html>
