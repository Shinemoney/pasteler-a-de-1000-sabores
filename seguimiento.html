<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Pedido - 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #FEF5E7; font-family: sans-serif; margin: 0;">

    <header>
        <div class="nav-container">
            <a href="index.html" class="brand">Pastelería 1000 Sabores</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px; padding-bottom: 50px; display: flex; justify-content: center;">
        <div id="ventana-seguimiento" style="position: relative; max-width: 600px; width: 90%; margin: auto; padding: 40px; background: white; border-radius: 15px; border: 2px solid #FFC0CB; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            
            <button onclick="document.getElementById('ventana-seguimiento').style.display='none'" 
                    style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 28px; cursor: pointer; color: #8B4513;">
                &times;
            </button>

            <h2 style="color: #8B4513; margin-top: 0;">Estado de tu Pedido</h2>
            <h3 id="order-display" style="color: #666;">Cargando...</h3>
            
            <div style="display: flex; justify-content: space-between; margin: 50px 0; color: #ccc;">
                <div id="est-1" style="font-weight:bold;">📦 Preparando</div>
                <div id="est-2">🚚 En Ruta</div>
                <div id="est-3">🏠 Entregado</div>
            </div>
            <p style="font-size: 0.9rem; color: #8B4513;">* El estado se actualiza automáticamente.</p>
        </div>
    </main>

    <div id="cart-sidebar" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; z-index: 9999; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; padding: 20px; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #8B4513;">Mi Carrito</h3>
            <button id="close-cart-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items-container" style="margin-top: 20px;"></div>
        <div id="cart-total-amount" style="font-weight: bold; font-size: 1.2rem; margin: 20px 0; color: #8B4513;"></div>
    </div>

    <script src="js/carrito.js"></script>
    <script>
        // Cargar ID de pedido desde localStorage
        const savedOrder = localStorage.getItem('ultimo_pedido');
        const orderDisplay = document.getElementById('order-display');
        if (orderDisplay) {
            orderDisplay.textContent = savedOrder ? "Pedido: " + savedOrder : "Pedido no encontrado";
        }

        // Lógica de simulación de estados
        let estados = ['est-1', 'est-2', 'est-3'];
        let i = 0;
        
        const actualizarEstado = () => {
            document.querySelectorAll('div[id^="est-"]').forEach(el => el.style.color = '#ccc');
            const elActual = document.getElementById(estados[i]);
            if(elActual) elActual.style.color = '#8B4513';
            i = (i + 1) % estados.length;
        };

        setInterval(actualizarEstado, 4000);
        actualizarEstado();
    </script>
</body>
</html>
