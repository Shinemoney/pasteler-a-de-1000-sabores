<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css"> <!-- Asegúrate de que este archivo tenga los estilos del footer -->
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial', sans-serif; background-color: #fdf6f0; padding-top: 90px; }

    /* HEADER UNIFICADO */
    header { 
        position: fixed; top: 0; left: 0; width: 100%; height: 80px;
        background-color: #8B4513; 
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    .nav-container { 
        display: flex; align-items: center; justify-content: space-between; 
        width: 100%; max-width: 1200px; padding: 0 20px; 
    }

    .logo-area { display: flex; align-items: center; gap: 15px; }
    .logo-area img { height: 50px; width: auto; border-radius: 50%; }
    .logo-area span { font-family: 'Pacifico', cursive; color: #FFC0CB; font-size: 1.5rem; }

    /* LINKS ROSADOS */
    .nav-links { display: flex; gap: 25px; }
    .nav-links a { 
        color: #FFC0CB; /* El rosado que querías */
        font-weight: bold; 
        text-decoration: none; 
        font-size: 1.1rem; 
        transition: color 0.3s;
    }
    .nav-links a:hover { color: #ffffff; } /* Blanco al pasar el mouse */
    
    .nav-cart { color: #FFC0CB; font-size: 1.2rem; cursor: pointer; }
    
    /* TARJETAS */
    .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
    .card { background: white; padding: 25px; border-radius: 15px; border-top: 5px solid #8B4513; cursor: pointer; transition: all 0.3s ease; }
    .card.seleccionada { background-color: #FFC0CB !important; border-top: 5px solid #ff69b4 !important; }
</style>
</head>
<body>
    <header>
        <div class="nav-container">
            <img src="assets/1logo.jpeg" alt="Logo" style="height: 60px; width: auto;">
            <span>Pastelería 1000 Sabores</span>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Login</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>
    <div id="nav-placeholder"></div>

    <section class="form-section">
        <div class="form-wrapper" style="max-width: 400px;"> 
            <h2>Inicio de Sesión</h2>

            <form id="form-login" novalidate>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="correo@gmail.cl">
                    <div class="error-text" id="err-login-email"></div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" placeholder="********">
                    <div class="error-text" id="err-login-pass"></div>
                </div>

                <!-- Banner movido dentro del form, sobre el botón -->
                <div class="success-banner" id="login-success" style="display: none; background-color: #d4edda; color: #155724; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px;">
                    ¡Bienvenido de nuevo!
                </div>

                <button type="submit" class="btn-action">Iniciar Sesión</button>
            </form>
        </div>
    </section>

    <script src="js/productos.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/validaciones.js"></script>
</body>
</html>
