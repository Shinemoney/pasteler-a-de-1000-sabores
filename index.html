<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="brand">Pastelería 1000 Sabores</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section style="text-align: center; padding-top: 100px;">
            <h1>Tradición y Dulzura</h1>
            <p>Bienvenidos a 1000 Sabores. Artesanía desde 1995.</p>
            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 25px;">
                <a href="productos.html" class="btn-action">Ver Catálogo de Ventas</a>
            </div>
        </section>
    </main>

    <div id="cart-sidebar" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; z-index: 9999; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; padding: 20px; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #8B4513;">Mi Carrito</h3>
            <button id="close-cart-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items-container" style="margin-top: 20px;"></div>
        <div id="cart-total-amount" style="font-weight: bold; font-size: 1.2rem; margin: 20px 0; color: #8B4513;"></div>
        <a href="pago.html" style="display:block; text-align:center; background:#8B4513; color:white; padding:15px; text-decoration:none; border-radius:6px; font-weight:bold;">
            Finalizar Pedido
        </a>
    </div>

    <footer>
        <p>&copy; 2026 Pastelería 1000 Sabores.</p>
    </footer>

    <script src="js/carrito.js"></script>
</body>
</html>
