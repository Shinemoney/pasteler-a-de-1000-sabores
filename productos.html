<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css"> <!-- Asegúrate de que este archivo tenga los estilos del footer -->
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial', sans-serif; background-color: #fdf6f0; padding-top: 90px; }

    /* HEADER UNIFICADO */
    header { 
        position: fixed; top: 0; left: 0; width: 100%; height: 80px;
        background-color: #8B4513; 
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    .nav-container { 
        display: flex; align-items: center; justify-content: space-between; 
        width: 100%; max-width: 1200px; padding: 0 20px; 
    }

    .logo-area { display: flex; align-items: center; gap: 15px; }
    .logo-area img { height: 50px; width: auto; border-radius: 50%; }
    .logo-area span { font-family: 'Pacifico', cursive; color: #FFC0CB; font-size: 1.5rem; }

    /* LINKS ROSADOS */
    .nav-links { display: flex; gap: 25px; }
    .nav-links a { 
        color: #FFC0CB; /* El rosado que querías */
        font-weight: bold; 
        text-decoration: none; 
        font-size: 1.1rem; 
        transition: color 0.3s;
    }
    .nav-links a:hover { color: #ffffff; } /* Blanco al pasar el mouse */
    
    .nav-cart { color: #FFC0CB; font-size: 1.2rem; cursor: pointer; }
    
    /* TARJETAS */
    .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
    .card { background: white; padding: 25px; border-radius: 15px; border-top: 5px solid #8B4513; cursor: pointer; transition: all 0.3s ease; }
    .card.seleccionada { background-color: #FFC0CB !important; border-top: 5px solid #ff69b4 !important; }
</style>
</head>
<body style="background-color: #FEF5E7; margin: 0;">

    <header>
        <div class="nav-container">
            <img src="assets/1logo.jpeg" alt="Logo" style="height: 60px; width: auto;">
            <span>Pastelería 1000 Sabores</span>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Login</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px; padding-bottom: 50px; max-width: 1000px; margin: 0 auto;">
        
        <h1 style="text-align: center; font-family: 'Lobster', cursive; color: #8B4513; font-size: 3rem; margin-bottom: 20px;">
            Catálogo de Productos
        </h1>
        
        <div style="text-align: center; margin-bottom: 40px;">
            <select id="filtro-forma" style="padding: 10px; font-size: 1rem; border-radius: 6px; border: 1px solid #ccc; width: 200px;">
                <option value="todas">Todas las formas</option>
                <option value="Cuadrada">Cuadrada</option>
                <option value="Circular">Redonda</option>
            </select>
        </div>

        <div id="grid-productos-target" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 0 20px;">
            </div>

    </main>

    <div id="cart-sidebar" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; z-index: 9999; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; padding: 20px; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #8B4513;">Mi Carrito</h3>
            <button id="close-cart-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items-container" style="margin-top: 20px;"></div>
        <div id="cart-total-amount" style="font-weight: bold; font-size: 1.2rem; margin: 20px 0; color: #8B4513;"></div>
        <a href="pago.html" style="display:block; text-align:center; background:#8B4513; color:white; padding:15px; text-decoration:none; border-radius:6px; font-weight:bold;">
            Finalizar Pedido
        </a>
    </div>

    <script src="js/carrito.js"></script>
    <script src="js/productos.js"></script>
</body>
</html>
