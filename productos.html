<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #fdf6f0; padding-top: 90px; }
        
        /* HEADER UNIFICADO */
        header { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background-color: #8B4513; display: flex; align-items: center; justify-content: center; z-index: 9999; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-container { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; padding: 0 20px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #FFC0CB; font-weight: bold; text-decoration: none; font-size: 1.1rem; transition: color 0.3s; }
        .nav-links a:hover { color: #ffffff; }
        .nav-cart { color: #FFC0CB; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body style="background-color: #FEF5E7; margin: 0;">

    <header>
        <div class="nav-container">
            <img src="assets/1logo.jpeg" alt="Logo" style="height: 60px; width: auto;">
            <span>Pastelería 1000 Sabores</span>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="login.html">Login</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px; padding-bottom: 50px; max-width: 1000px; margin: 0 auto;">
        <h1 style="text-align: center; color: #8B4513; font-size: 3rem; margin-bottom: 20px;">Catálogo</h1>
        
        <div style="text-align: center; margin-bottom: 40px;">
            <select id="filtro-forma" style="padding: 10px; font-size: 1rem; border-radius: 6px; border: 1px solid #ccc; width: 200px;">
                <option value="todas">Todas las formas</option>
                <option value="Cuadrada">Cuadrada</option>
                <option value="Circular">Redonda</option>
            </select>
        </div>

        <div id="grid-productos-target" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 0 20px;"></div>
    </main>

    <div id="cart-sidebar" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; z-index: 9999; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #8B4513;">Mi Carrito</h3>
            <button id="close-cart-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items-container" style="margin-top: 20px;"></div>
        <div id="cart-total-amount" style="font-weight: bold; font-size: 1.2rem; margin: 20px 0; color: #8B4513;"></div>
        <a href="pago.html" style="display:block; text-align:center; background:#8B4513; color:white; padding:15px; text-decoration:none; border-radius:6px; font-weight:bold;">Finalizar Pedido</a>
    </div>

    <script src="js/carrito.js"></script>
    <script src="js/productos.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            document.getElementById('cart-count').innerText = totalItems;
        });
    </script>
    <div id="cart-sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Tu Carrito</h2>
        <button id="close-cart-btn" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="cart-items-container"></div>
    <div id="cart-total-amount" style="margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #8B4513;"></div>
</div>
</body>
</html>
