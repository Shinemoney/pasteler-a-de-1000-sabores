<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #FFF5E1; font-family: sans-serif; margin: 0;">

    <div id="nav-placeholder"></div>

    <main style="padding: 40px 20px; max-width: 1000px; margin: auto;">
        <h1 style="color: #8B4513; text-align: center;">Nuestro Catálogo</h1>
        <div id="grid-productos-target" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px;"></div>
    </main>

    <div id="cart-sidebar" style="position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background-color: #ffffff; box-shadow: -5px 0 15px rgba(0,0,0,0.15); z-index: 10000; transition: right 0.3s ease; padding: 20px; border-left: 3px solid #FFC0CB; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0; color: #8B4513;"><i class="fas fa-shopping-cart"></i> Tu Carrito</h3>
            <button id="close-cart-btn" style="background: none; border: none; font-size: 26px; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items-container"></div>
        <div style="margin-top: 20px; border-top: 2px solid #FFC0CB; padding-top: 15px;">
            <div style="font-weight: bold; color: #8B4513; font-size: 18px; margin-bottom: 15px;">
                Total: <span id="cart-total-amount">$0 CLP</span>
            </div>
            <button onclick="window.location.href='pago.html'" style="width: 100%; background-color: #8B4513; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Proceder al Pago
            </button>
        </div>
    </div>

    <script src="js/datos.js"></script>
    <script src="js/carrito.js"></script>
    
    <script>
        const container = document.getElementById('grid-productos-target');
        if (typeof listadoProductos !== 'undefined') {
            listadoProductos.forEach(prod => {
                const card = document.createElement('div');
                card.style.background = '#fff'; card.style.padding = '15px'; card.style.borderRadius = '10px'; card.style.border = '1px solid #FFC0CB';
                card.innerHTML = `
                    <img src="${prod.imagen}" style="width:100%; height:180px; object-fit:cover; border-radius:6px;">
                    <h3 style="color:#8B4513;">${prod.nombre}</h3>
                    <p><strong>$${prod.precio.toLocaleString('es-CL')}</strong></p>
                    <button onclick="agregarAlCarrito('${prod.codigo}')" style="width:100%; background:#FFC0CB; border:none; padding:10px; cursor:pointer; border-radius:5px; font-weight:bold; color:#8B4513;">Añadir al Carrito</button>
                    <div style="margin-top:10px; text-align:center;">
                        <small>Compartir:</small><br>
                        <a href="https://wa.me/?text=Mira esta torta: ${prod.nombre}" target="_blank" style="margin:0 5px; color:#25D366;"><i class="fab fa-whatsapp"></i></a>
                        <a href="https://www.facebook.com/sharer/sharer.php?u=index.html" target="_blank" style="margin:0 5px; color:#4267B2;"><i class="fab fa-facebook"></i></a>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
