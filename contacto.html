<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pastelería 1000 Sabores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css"> <!-- Asegúrate de que este archivo tenga los estilos del footer -->
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Arial', sans-serif; background-color: #fdf6f0; padding-top: 90px; }

    /* HEADER UNIFICADO */
    header { 
        position: fixed; top: 0; left: 0; width: 100%; height: 80px;
        background-color: #8B4513; 
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    .nav-container { 
        display: flex; align-items: center; justify-content: space-between; 
        width: 100%; max-width: 1200px; padding: 0 20px; 
    }

    .logo-area { display: flex; align-items: center; gap: 15px; }
    .logo-area img { height: 50px; width: auto; border-radius: 50%; }
    .logo-area span { font-family: 'Pacifico', cursive; color: #FFC0CB; font-size: 1.5rem; }

    /* LINKS ROSADOS */
    .nav-links { display: flex; gap: 25px; }
    .nav-links a { 
        color: #FFC0CB; /* El rosado que querías */
        font-weight: bold; 
        text-decoration: none; 
        font-size: 1.1rem; 
        transition: color 0.3s;
    }
    .nav-links a:hover { color: #ffffff; } /* Blanco al pasar el mouse */
    
    .nav-cart { color: #FFC0CB; font-size: 1.2rem; cursor: pointer; }
    
    /* TARJETAS */
    .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
    .card { background: white; padding: 25px; border-radius: 15px; border-top: 5px solid #8B4513; cursor: pointer; transition: all 0.3s ease; }
    .card.seleccionada { background-color: #FFC0CB !important; border-top: 5px solid #ff69b4 !important; }
</style>
</head>
<body>

    <header>
        <div class="nav-container">
            <img src="assets/1logo.jpeg" alt="Logo" style="height: 60px; width: auto;">
           <span>Pastelería 1000 Sabores</span>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px; display: flex; justify-content: center; padding-bottom: 50px;">
        <section class="form-section" style="width: 90%; max-width: 600px;">
            <div class="form-wrapper" style="background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border: 1px solid var(--accent-pink);">
                
                <h2 style="color: var(--accent-choco); margin-bottom: 20px; text-align: center;">Formulario de Contacto</h2>
                
                <form id="form-contacto" novalidate style="display: flex; flex-direction: column; gap: 18px;">
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label style="font-weight: 600; color: var(--accent-choco);">Nombre Completo</label>
                        <input type="text" id="cont-nombre" placeholder="Tu nombre" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                        <div class="error-text" id="err-cont-nombre" style="color: #e1306c; font-size: 14px; display: none;"></div>
                    </div>
                    
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label style="font-weight: 600; color: var(--accent-choco);">Correo Electrónico</label>
                        <input type="email" id="cont-email" placeholder="ejemplo@gmail.cl" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                        <div class="error-text" id="err-cont-email" style="color: #e1306c; font-size: 14px; display: none;"></div>
                    </div>
                    
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label style="font-weight: 600; color: var(--accent-choco);">Comentario</label>
                        <textarea id="cont-mensaje" rows="5" placeholder="Escribe tu consulta aquí..." style="padding: 10px; border: 1px solid #ccc; border-radius: 6px;"></textarea>
                        <div class="error-text" id="err-cont-mensaje" style="color: #e1306c; font-size: 14px; display: none;"></div>
                    </div>

                    <div class="success-banner" id="contacto-success" style="display: none; background-color: #d4edda; color: #155724; padding: 10px; border-radius: 6px; text-align: center;">
                        ¡Mensaje enviado exitosamente!
                    </div>

                    <button type="submit" class="btn-action" style="padding: 12px; border: none; cursor: pointer; background-color: var(--accent-pink); color: var(--accent-choco); border-radius: 6px; font-weight: bold;">
                        Enviar Mensaje
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="js/validaciones.js"></script>
</body>
</html>
