<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesar Pago - 1000 Sabores</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #FEF5E7; font-family: sans-serif; margin: 0;">

    <header>
        <div class="nav-container">
            <a href="index.html" class="brand">Pastelería 1000 Sabores</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="productos.html">Productos</a>
                <a href="registro.html">Registro</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-cart">
                <a href="#" id="open-cart-trigger" style="text-decoration: none; color: inherit;">
                    <i class="fas fa-shopping-cart"></i> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main style="padding-top: 100px; display: flex; justify-content: center; padding-bottom: 50px;">
        <div style="background: white; padding: 40px; border-radius: 15px; border: 2px solid #FFC0CB; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <h2 style="color: #8B4513; text-align: center;">Datos de Envío</h2>
            
            <div id="resumen-pago" style="margin-bottom: 20px; padding: 10px; background: #FFF5E1; border-radius: 5px;">
                <strong>Total a pagar:</strong> <span id="total-display">$0</span>
            </div>
            
            <label style="color:#8B4513; font-weight:bold;">Fecha de entrega preferida:</label>
            <input type="date" id="fecha-entrega" style="width: 100%; margin: 10px 0 20px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            
            <button onclick="procesarPago()" style="width: 100%; background: #8B4513; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Confirmar Pedido
            </button>
        </div>
    </main>

    <div id="cart-sidebar" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: white; z-index: 9999; box-shadow: -2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; padding: 20px; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color: #8B4513;">Mi Carrito</h3>
            <button id="close-cart-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items-container" style="margin-top: 20px;"></div>
        <div id="cart-total-amount" style="font-weight: bold; font-size: 1.2rem; margin: 20px 0; color: #8B4513;"></div>
    </div>

    <script src="js/carrito.js"></script>
    <script>
        // Mostrar total al cargar
        document.addEventListener("DOMContentLoaded", () => {
            const carrito = JSON.parse(localStorage.getItem('carrito_sabores')) || [];
            const total = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
            document.getElementById('total-display').textContent = `$${total.toLocaleString('es-CL')} CLP`;
        });

        function procesarPago() {
            const fecha = document.getElementById('fecha-entrega').value;
            if(!fecha) { alert('Por favor selecciona una fecha'); return; }
            
            const orderId = 'PED-' + Math.floor(Math.random() * 9000 + 1000);
            localStorage.setItem('ultimo_pedido', orderId);
            localStorage.removeItem('carrito_sabores'); // Vaciar carrito tras pago
            
            alert('¡Pago exitoso! Tu pedido ' + orderId + ' ha sido registrado.');
            window.location.href = 'seguimiento.html';
        }
    </script>
</body>
</html>
